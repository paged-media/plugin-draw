# CI evidence for the state matrix (plugin.draw stage): run the
# machine unit tests and publish normalized results via the shared
# publish-results action. Vitest's junit output carries no @feat:
# tags — `map: "true"` applies the state repo's ingest/test-map.yaml
# bridge at convert time. Cadence is central (state ingest/
# schedules.yaml → scheduler.yml workflow_dispatch); no schedule here.
#
# Layout note: the link: chain (draw-* → ../../../sdk/packages/*)
# requires plugin-draw/ and sdk/ as SIBLINGS under the workspace, so
# both checkouts are nested. The editor checkout is NOT needed —
# plugin-api re-exports editor types only (erased at runtime), and
# this job runs tests, not typecheck (wire-compat lives there).
name: vitest
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vitest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin-draw
      - uses: actions/checkout@v4
        with:
          repository: paged-media/sdk
          path: sdk
          token: ${{ secrets.STATE_DISPATCH_TOKEN || github.token }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install (sdk sibling satisfies the link chain)
        run: pnpm install --frozen-lockfile --dir plugin-draw
      - name: vitest (junit per package; red results still publish)
        run: |
          pnpm -r --no-bail --dir plugin-draw exec \
            vitest run --reporter=junit --outputFile=junit.xml || true
          cat plugin-draw/packages/*/junit.xml > junit-all.xml
          [ -s junit-all.xml ] # at least one package must have produced results
      - uses: paged-media/state/actions/publish-results@main
        with:
          source: plugin-draw
          suite: vitest
          format: nextest-junit
          path: junit-all.xml
          map: "true"
          dispatch-token: ${{ secrets.STATE_DISPATCH_TOKEN }}
