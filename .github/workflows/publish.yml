name: publish

# Token-bootstrap publish for the consolidated @paged-media/draw package.
# NEW package name → OIDC can't first-publish. After the first publish, add a
# Trusted Publisher on npm and switch back to OIDC (drop NODE_AUTH_TOKEN).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r build
      - name: publish (canary)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for dir in packages/draw-bundle; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip $name@$version (already published)"; continue
            fi
            tgz="$RUNNER_TEMP/$(echo "$name" | sed 's#@##; s#/#-#')-${version}.tgz"
            ( cd "$dir" && pnpm pack --pack-destination "$RUNNER_TEMP" )
            echo "publish $name@$version"
            npm publish "$tgz" --tag canary --access public
          done
