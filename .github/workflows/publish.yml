name: publish

# Publish @paged-media/draw to npm via OIDC TRUSTED PUBLISHING (tokenless).
# Requires a Trusted Publisher on npm: org paged-media, repo plugin-draw,
# workflow publish.yml. Pre-1.0 -canary.N; unchanged versions skip.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: upgrade npm (OIDC needs >= 11.5.1)
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r build
      - name: publish via OIDC (canary)
        run: |
          set -e
          for dir in packages/draw-bundle; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip $name@$version (already published)"; continue
            fi
            tgz="$RUNNER_TEMP/$(echo "$name" | sed 's#@##; s#/#-#')-${version}.tgz"
            ( cd "$dir" && pnpm pack --pack-destination "$RUNNER_TEMP" )
            echo "publish $name@$version via OIDC"
            npm publish "$tgz" --tag canary --access public
          done
